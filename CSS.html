<style>
  body {
    font-family: 'Kanit', sans-serif;
  }
  
  /* Custom Scrollbar */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: #f1f1f1; }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

  /* Loading Spinner */
  .loader-spinner {
    width: 50px;
    height: 50px;
    border: 5px solid #e5e7eb;
    border-top-color: #3B82F6;
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

  /* Navigation Active State */
  .nav-item { padding: 10px 15px; border-radius: 8px; display: flex; align-items: center; gap: 12px; transition: all 0.3s; cursor: pointer; color: #cbd5e1; }
  .nav-item:hover { background-color: rgba(255,255,255,0.1); color: #fff; }
  .nav-item.active { background-color: #3B82F6; color: #fff; font-weight: 500; }
</style>
