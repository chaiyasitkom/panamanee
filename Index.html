<body class="bg-[#F3F4F6] text-gray-800 flex h-screen overflow-hidden">

  <div id="loader" class="fixed inset-0 bg-white/80 z-50 flex flex-col items-center justify-center hidden">
    <div class="loader-spinner mb-4"></div>
    <p class="text-[#1E40AF] font-medium text-lg">กำลังประมวลผล...</p>
  </div>

  <div id="view-login" class="w-full h-full flex items-center justify-center bg-gradient-to-br from-[#1E3A8A] to-[#172554]">
    <div class="bg-white p-8 rounded-xl shadow-2xl w-96 max-w-[90%]">
      <div class="text-center mb-8">
        <i class="fa-solid fa-wrench text-4xl text-[#3B82F6] mb-3"></i>
        <h2 class="text-2xl font-bold text-[#1E40AF]">เข้าสู่ระบบแจ้งซ่อม</h2>
      </div>
      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="mb-4">
          <label class="block text-sm font-medium mb-1">Username</label>
          <input type="text" id="username" class="w-full border rounded-lg p-2 focus:ring-2 focus:ring-[#3B82F6] outline-none" required>
        </div>
        <div class="mb-6">
          <label class="block text-sm font-medium mb-1">Password</label>
          <input type="password" id="password" class="w-full border rounded-lg p-2 focus:ring-2 focus:ring-[#3B82F6] outline-none" required>
        </div>
        <button type="submit" class="w-full bg-[#1E40AF] text-white py-2 rounded-lg hover:bg-[#1e3a8a] transition font-medium">เข้าสู่ระบบ</button>
      </form>
    </div>
  </div>

  <div id="view-app" class="w-full h-full flex hidden">
    
    <aside class="w-64 bg-gradient-to-b from-[#1E3A8A] to-[#172554] text-white flex flex-col transition-all duration-300" id="sidebar">
      <div class="p-5 text-center border-b border-white/20">
        <h1 class="text-xl font-bold tracking-wider">REPAIR SYS</h1>
        <p class="text-xs text-blue-200 mt-1" id="user-display-role">Role</p>
      </div>
      <nav class="flex-1 p-4 space-y-2" id="nav-menu">
        </nav>
      <div class="p-4 border-t border-white/20">
        <button onclick="logout()" class="w-full flex items-center justify-center space-x-2 bg-red-500/20 text-red-100 py-2 rounded hover:bg-red-500 transition">
          <i class="fa-solid fa-sign-out-alt"></i>
          <span>ออกจากระบบ</span>
        </button>
      </div>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
      <header class="bg-white shadow-sm h-16 flex items-center justify-between px-6">
        <button class="lg:hidden text-gray-500 hover:text-[#1E40AF]" onclick="toggleSidebar()">
          <i class="fa-solid fa-bars text-xl"></i>
        </button>
        <div class="flex items-center space-x-3 ml-auto">
          <div class="w-8 h-8 rounded-full bg-[#3B82F6] text-white flex items-center justify-center font-bold" id="user-avatar">A</div>
          <span class="font-medium" id="user-display-name">User Name</span>
        </div>
      </header>

      <div class="flex-1 overflow-y-auto p-6" id="content-area">
        </div>
    </main>
  </div>
