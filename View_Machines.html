<template id="tmpl-machines">
  <div class="flex justify-between items-center mb-6">
    <h2 class="text-2xl font-bold text-[#1E40AF]">รายการเครื่องจักร / อุปกรณ์</h2>
    <button onclick="openAddMachineModal()" class="bg-[#3B82F6] text-white px-4 py-2 rounded-lg hover:bg-blue-600 transition flex items-center gap-2 shadow-sm">
      <i class="fa-solid fa-plus"></i> เพิ่มข้อมูล
    </button>
  </div>
  
  <div class="bg-white p-4 rounded-xl shadow mb-4 flex gap-4">
    <input type="text" id="search-machine" placeholder="ค้นหารหัส, โครงการ หรือ ชื่อเครื่องจักร..." class="border rounded p-2 flex-1 focus:ring-2 focus:ring-[#3B82F6] outline-none text-sm">
    <select id="filter-project" class="border rounded p-2 outline-none text-sm">
      <option value="">ทุกโครงการ</option>
      <option value="นวนคร">นวนคร DC6</option>
      <option value="แพร่">แพร่</option>
      <option value="สุวรรณภูมิ">สุวรรณภูมิ</option>
    </select>
    <button onclick="fetchMachines()" class="bg-gray-100 px-4 py-2 rounded hover:bg-gray-200 border"><i class="fa-solid fa-search"></i></button>
  </div>

  <div class="bg-white rounded-xl shadow overflow-x-auto">
    <table class="w-full text-left border-collapse whitespace-nowrap text-sm">
      <thead>
        <tr class="bg-gray-100 text-gray-700 border-b">
          <th class="p-3 font-medium text-center">ลำดับ</th>
          <th class="p-3 font-medium">โครงการ</th>
          <th class="p-3 font-medium">รหัสเครื่องจักร</th>
          <th class="p-3 font-medium">ประเภท/เครื่องจักร</th>
          <th class="p-3 font-medium">ยี่ห้อ / รุ่น</th>
          <th class="p-3 font-medium">ขนาด</th>
          <th class="p-3 font-medium">ซีเรียล</th>
          <th class="p-3 font-medium text-center">จำนวน</th>
          <th class="p-3 font-medium">กรรมสิทธิ์</th>
          <th class="p-3 font-medium">รับเข้าวันที่</th>
          <th class="p-3 font-medium text-center shadow-l">จัดการ</th>
        </tr>
      </thead>
      <tbody id="machine-table-body">
        <tr>
            <td colspan="11" class="p-6 text-center text-gray-500">กำลังโหลดข้อมูล...</td>
        </tr>
      </tbody>
    </table>
  </div>
</template>
